---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: words-cicd-pipeline
spec:
  workspaces:
  - name: shared
  params:
  - name: IMAGE_NAME
    type: string
    default: "words"
  - name: IMAGE_REGISTRY
    type: string
    default: "registry.ocp4.example.com:8443"
  - name: GIT_REPO
    type: string
    default: "https://git.ocp4.example.com/developer/DO288-apps"
  - name: GIT_REVISION
    type: string
    default: "main"
  - name: APP_PATH
    type: string
    default: "apps/compreview-cicd/words"
  tasks:
  - name: fetch-repository
    taskRef:
      resolver: cluster
      params:
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: namespace
        value: openshift-pipelines
    workspaces:
    - name: output
      workspace: shared
    params:
    - name: URL
      value: $(params.GIT_REPO)
    - name: REVISION
      value: $(params.GIT_REVISION)
    - name: DELETE_EXISTING
      value: "true"
    - name: SSL_VERIFY
      value: "false"
  - name: npm-install
    taskRef:
      name: npm
    workspaces:
    - name: source
      workspace: shared
    params:
    - name: CONTEXT
      value: $(params.APP_PATH)
    - name: ARGS
      value: "install --no-package-lock"
    runAfter:
    - fetch-repository      
  - name: npm-test
    taskRef:
      name: npm
    workspaces:
    - name: source
      workspace: shared
    params:
    - name: CONTEXT
      value: $(params.APP_PATH)
    - name: ARGS
      value: "test"
    runAfter:
    - npm-install
  - name: npm-lint
    taskRef:
      name: npm
    workspaces:
    - name: source
      workspace: shared
    params:
    - name: CONTEXT
      value: $(params.APP_PATH)
    - name: ARGS
      value: "run lint"
    runAfter:
    - npm-install
  - name: build-push
    taskRef:
      resolver: cluster
      params:
      - name: kind
        value: task
      - name: name
        value: buildah
      - name: namespace
        value: openshift-pipelines
    workspaces:
    - name: source
      workspace: shared
    params:
    - name: IMAGE
      value: $(params.IMAGE_REGISTRY)/$(context.pipelineRun.namespace)/$(params.IMAGE_NAME):$(context.pipelineRun.uid)
    - name: DOCKERFILE
      value: ./Containerfile
    - name: CONTEXT
      value: $(params.APP_PATH)
    runAfter:
    - npm-test
    - npm-lint      
  - name: oc-deploy
    taskRef:
      resolver: cluster
      params:
      - name: kind
        value: task
      - name: name
        value: openshift-client
      - name: namespace
        value: openshift-pipelines
    workspaces:
    - name: source
      workspace: shared
    params:
    - name: SCRIPT
      value: |
        oc process -f $(params.APP_PATH)/kubefiles/app.yaml \
        -p IMAGE_NAME=$(params.IMAGE_REGISTRY)/$(context.pipelineRun.namespace)/$(params.IMAGE_NAME):$(context.pipelineRun.uid) \
        | oc create -f
    runAfter:
    - build-push       
